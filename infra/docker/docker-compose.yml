# ponytail: minimal compose for local dev; services are stubs until implemented
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: freshlens
      POSTGRES_PASSWORD: freshlens
      POSTGRES_DB: freshlens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freshlens"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # api:
  #   build: ../../apps/api
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

  # worker:
  #   build: ../../packages/ml
  #   depends_on:
  #     redis:
  #       condition: service_healthy

volumes:
  postgres_data:
