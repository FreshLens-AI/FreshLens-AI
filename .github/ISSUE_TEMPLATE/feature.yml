name: Feature
description: New functionality for FreshLens
title: "[area] "
labels: ["type: feature"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - api
        - web
        - mobile
        - ml
        - infra
        - db
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P1
        - P2
        - P0
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What should be built and why?
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Checkboxes that define "done"
      value: |
        - [ ] 
        - [ ] 
    validations:
      required: true

  - type: input
    id: milestone
    attributes:
      label: Milestone
      description: e.g. M3 — Iteration 1 (mid-eval)
    validations:
      required: false
